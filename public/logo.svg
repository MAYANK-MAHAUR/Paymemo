<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="PayMemo">
  <defs>
    <linearGradient id="pm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A8F139"/>
      <stop offset="1" stop-color="#0E0E0E"/>
    </linearGradient>
    <linearGradient id="pm-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#pm-bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="16" y="16" width="480" height="240" rx="120" fill="#FFFFFF" fill-opacity="0.06"/>
  <!-- Stem -->
  <rect x="140" y="130" width="82" height="262" rx="41" fill="url(#pm-glow)"/>
  <!-- Bowl -->
  <circle cx="296" cy="208" r="108" fill="#FFFFFF"/>
  <!-- Signet dot -->
  <circle cx="296" cy="208" r="36" fill="#0E0E0E"/>
  <!-- Small accent pulse -->
  <circle cx="394" cy="392" r="22" fill="#A8F139"/>
</svg>
